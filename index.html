<!DOCTYPE html>
<!--
  书摘卡片 · 离线 HTML 源文件（输入书名→AI 生成→下载 PNG）

  用法：
  1. 在项目根目录跑：npm run dev
  2. 浏览器打开：http://localhost:3000/cards.html
  3. 输入书名，点"生成卡片"
  4. 5 张卡片出来后，单张可下载，或"一键下载全部 (zip)"

  原理：放在 Next.js 的 public/ 目录下，HTML 里的 fetch('/api/generate')
  是同源请求，调用项目自带的 Claude API route。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>书摘卡片 · 输入书名生成</title>

  <!-- Noto Serif / Sans SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --cream: #f5f1ea;
      --cream-deep: #ebe5da;
      --cream-light: #faf7f1;
      --ink-strong: #2c2a26;
      --ink: #3f3c36;
      --ink-muted: #6b6760;
      --ink-soft: #9b968d;
      --warm: #c9a66b;
      --line: #d9d2c5;
      --line-soft: #e8e2d4;
      --font-serif: "Noto Serif SC", Georgia, serif;
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--ink-strong);
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    /* ====== Header ====== */
    .page-header { text-align: center; margin-bottom: 48px; }
    .page-header .tag {
      font-size: 12px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .page-header h1 {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 48px;
      margin: 12px 0 0;
    }
    .page-header p {
      color: var(--ink-muted);
      margin: 12px 0 0;
      font-size: 16px;
    }

    /* ====== Input area ====== */
    .input-area { margin-bottom: 32px; }
    .input-row {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--cream-light);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(44, 42, 38, 0.04);
    }
    .input-row input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 24px;
      font-size: 18px;
      color: var(--ink-strong);
    }
    .input-row input[type="text"]::placeholder { color: var(--ink-soft); }
    .input-row button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--ink-strong);
      color: var(--cream);
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .input-row button:hover { background: var(--ink); }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-row button .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(245, 241, 234, 0.3);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .input-hint {
      max-width: 768px;
      margin: 16px auto 0;
      text-align: center;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .input-hint .btn-cover-toggle {
      background: none;
      border: none;
      color: var(--ink-muted);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 12px;
      padding: 4px 8px;
    }
    .input-hint .btn-cover-toggle:hover { color: var(--ink-strong); }

    .cover-input-box {
      max-width: 768px;
      margin: 12px auto 0;
      background: var(--cream-light);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }
    .cover-input-box label {
      display: block;
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }
    .cover-input-box input[type="url"] {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-family: var(--font-sans);
      color: var(--ink-strong);
      outline: none;
    }
    .cover-input-box input[type="url"]:focus { border-color: var(--ink-strong); }
    .cover-input-box .preview {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cover-input-box .preview img {
      width: 48px;
      height: 64px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(44, 42, 38, 0.04);
    }
    .cover-input-box .preview p { font-size: 12px; color: var(--ink-muted); margin: 0; }
    .cover-input-box .preview-error { color: #c53030; font-size: 12px; margin-top: 8px; }

    .error-msg {
      max-width: 768px;
      margin: 16px auto 0;
      text-align: center;
      font-size: 13px;
      color: #c53030;
    }

    /* ====== Deck grid ====== */
    .deck {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }
    .slot { display: flex; flex-direction: column; }
    .slot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
      margin-bottom: 12px;
    }
    .slot-header .name { font-size: 14px; color: var(--ink-muted); }
    .slot-header .download {
      opacity: 0;
      background: var(--cream-light);
      border: 1px solid var(--line);
      color: var(--ink-muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.15s;
    }
    .slot:hover .download { opacity: 1; }
    .slot-header .download:hover {
      color: var(--ink-strong);
      border-color: var(--ink-strong);
    }

    /* ====== Skeleton ====== */
    .skeleton {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }
    .skeleton .cell {
      aspect-ratio: 9 / 16;
      background: var(--cream-deep);
      border-radius: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ====== Download-all bar ====== */
    .download-all {
      max-width: 1200px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .download-all h2 {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 28px;
      margin: 0;
    }
    .download-all .meta { font-size: 14px; color: var(--ink-muted); margin: 4px 0 0; }
    .download-all .btn-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
      color: var(--ink-strong);
      border: 2px solid var(--ink-strong);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .download-all .btn-all:hover {
      background: var(--ink-strong);
      color: var(--cream);
    }
    .download-all .btn-all:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ====== Card canvas（与 static-demo.html 同结构） ====== */
    .card-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
    }
    .card-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 1080px;
      height: 1920px;
      background: var(--cream);
      color: var(--ink-strong);
      box-shadow: 0 1px 2px rgba(44, 42, 38, 0.04),
        0 8px 24px rgba(44, 42, 38, 0.06);
      transform-origin: top left;
      overflow: hidden;
    }
    .badge {
      position: absolute;
      top: 80px; left: 80px;
      display: flex; align-items: center; gap: 24px;
      z-index: 10;
    }
    .badge .num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 96px; height: 96px; border-radius: 24px;
      background: var(--ink-strong); color: var(--cream);
      font-family: var(--font-serif); font-weight: 700; font-size: 44px;
      letter-spacing: 1px;
    }
    .badge .of {
      font-family: var(--font-sans); font-weight: 500; color: var(--ink-muted);
      font-size: 32px; letter-spacing: 4px;
    }
    .watermark {
      position: absolute; right: 80px; bottom: 60px;
      font-family: var(--font-sans); color: var(--ink-soft);
      font-size: 24px; letter-spacing: 4px;
    }

    /* 卡片 1：封面 */
    .card-cover .topline { position: absolute; top: 220px; left: 80px; right: 80px; height: 2px; background: var(--ink-strong); }
    .card-cover .reader-tag { position: absolute; top: 260px; left: 80px; font-size: 28px; letter-spacing: 12px; color: var(--ink-muted); text-transform: uppercase; }
    .card-cover .cover-img { position: absolute; top: 360px; left: 80px; right: 80px; height: 760px; display: flex; align-items: center; justify-content: center; }
    .card-cover .cover-img .frame { max-width: 100%; max-height: 100%; background: var(--cream-light); padding: 20px; border-radius: 24px; box-shadow: 0 2px 8px rgba(44, 42, 38, 0.08), 0 24px 48px rgba(44, 42, 38, 0.18); }
    .card-cover .cover-img img { display: block; max-width: 880px; max-height: 720px; width: auto; height: auto; object-fit: contain; border-radius: 8px; }
    .card-cover .cover-img .placeholder { width: 100%; height: 100%; background: var(--cream-deep); border: 3px solid var(--ink-strong); border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .card-cover .cover-img .placeholder .emoji { font-size: 200px; line-height: 1; }
    .card-cover .cover-img .placeholder .label { margin-top: 24px; font-size: 28px; letter-spacing: 8px; color: var(--ink-muted); text-transform: uppercase; }
    .card-cover h1.title { position: absolute; top: 1180px; left: 80px; right: 80px; font-family: var(--font-serif); font-weight: 700; font-size: 132px; line-height: 1.15; letter-spacing: -2px; margin: 0; }
    .card-cover .author { position: absolute; top: 1450px; left: 80px; font-size: 36px; color: var(--ink); letter-spacing: 2px; }
    .card-cover .tagline { position: absolute; top: 1540px; left: 80px; right: 80px; font-family: var(--font-serif); font-style: italic; font-size: 38px; line-height: 1.4; color: var(--ink-muted); }
    .card-cover .bottomline { position: absolute; bottom: 220px; left: 80px; right: 80px; height: 4px; background: var(--ink-strong); }
    .card-cover .footer-tag { position: absolute; bottom: 280px; left: 80px; right: 80px; font-size: 28px; letter-spacing: 8px; color: var(--ink-strong); text-transform: uppercase; }

    /* 卡片 2：核心观点 */
    .card-core .label { position: absolute; top: 280px; left: 80px; right: 80px; font-size: 32px; letter-spacing: 8px; color: var(--ink-muted); text-transform: uppercase; }
    .card-core .pill { position: absolute; top: 360px; left: 80px; padding: 16px 32px; background: var(--ink-strong); color: var(--cream); border-radius: 999px; font-size: 32px; letter-spacing: 4px; font-weight: 500; }
    .card-core .line-top { position: absolute; top: 580px; left: 80px; right: 80px; height: 2px; background: var(--ink-strong); }
    .card-core .text-wrap { position: absolute; top: 660px; left: 80px; right: 80px; bottom: 440px; overflow: hidden; }
    .card-core .text-wrap p { margin: 0; font-family: var(--font-serif); font-weight: 500; font-size: 72px; line-height: 1.65; letter-spacing: 1px; color: var(--ink-strong); }
    .card-core .line-bottom { position: absolute; bottom: 380px; left: 80px; right: 80px; height: 2px; background: var(--ink-strong); }
    .card-core .sub { position: absolute; bottom: 240px; left: 80px; right: 80px; font-size: 32px; color: var(--ink-muted); line-height: 1.6; }

    /* 卡片 3：逻辑框架 */
    .card-framework .label { position: absolute; top: 280px; left: 80px; right: 80px; font-size: 32px; letter-spacing: 8px; color: var(--ink-muted); text-transform: uppercase; }
    .card-framework h2.title { position: absolute; top: 340px; left: 80px; right: 80px; font-family: var(--font-serif); font-weight: 700; font-size: 96px; line-height: 1.2; margin: 0; }
    .card-framework .sub { position: absolute; top: 470px; left: 80px; right: 80px; font-size: 30px; color: var(--ink-muted); }
    .card-framework .list { position: absolute; top: 600px; left: 80px; right: 80px; }
    .card-framework .row { position: absolute; left: 0; right: 0; display: flex; }
    .card-framework .row .num { flex-shrink: 0; width: 84px; height: 84px; border-radius: 999px; border: 3px solid var(--ink-strong); background: var(--cream); color: var(--ink-strong); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 40px; }
    .card-framework .row.alt .num { background: var(--ink-strong); color: var(--cream); }
    .card-framework .row .body { flex: 1; margin-left: 24px; padding-top: 2px; }
    .card-framework .row .name { font-family: var(--font-serif); font-weight: 700; font-size: 56px; line-height: 1.1; }
    .card-framework .row .desc { font-family: var(--font-sans); font-size: 30px; line-height: 1.45; color: var(--ink-muted); margin-top: 8px; }
    .card-framework .dots { position: absolute; bottom: 200px; left: 80px; display: flex; }
    .card-framework .dots .dot { height: 12px; border-radius: 999px; margin-right: 10px; background: var(--line); }
    .card-framework .dots .dot.on { background: var(--ink-strong); }

    /* 卡片 4：行动启示 */
    .card-insight .label, .card-mental .label { position: absolute; top: 280px; left: 80px; right: 80px; font-size: 32px; letter-spacing: 8px; color: var(--ink-muted); text-transform: uppercase; }
    .card-insight h2.title, .card-mental h2.title { position: absolute; top: 340px; left: 80px; right: 80px; font-family: var(--font-serif); font-weight: 700; font-size: 96px; line-height: 1.2; margin: 0; }
    .card-insight .sub, .card-mental .sub { position: absolute; top: 620px; left: 80px; right: 80px; font-size: 30px; color: var(--ink-muted); }
    .card-insight .list, .card-mental .list { position: absolute; top: 740px; left: 80px; right: 80px; }
    .card-insight .row, .card-mental .row { position: absolute; left: 0; right: 0; display: flex; }
    .card-insight .row .check { flex-shrink: 0; width: 72px; height: 72px; border-radius: 16px; background: var(--cream); border: 3px solid var(--ink-strong); color: var(--ink-strong); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-top: 6px; }
    .card-insight .row .text { flex: 1; margin-left: 24px; padding-top: 12px; font-family: var(--font-serif); font-size: 46px; line-height: 1.4; color: var(--ink-strong); }

    /* 卡片 4 替代：思维模型 */
    .card-mental .row .num { flex-shrink: 0; width: 84px; height: 84px; border-radius: 999px; background: var(--ink-strong); color: var(--cream); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 40px; }
    .card-mental .row.alt .num { background: var(--cream); color: var(--ink-strong); border: 3px solid var(--ink-strong); }
    .card-mental .row .body { flex: 1; margin-left: 24px; padding-top: 2px; }
    .card-mental .row .name { font-family: var(--font-serif); font-weight: 700; font-size: 56px; line-height: 1.1; }
    .card-mental .row .app { font-family: var(--font-sans); font-size: 28px; line-height: 1.4; color: var(--ink-muted); margin-top: 8px; }

    /* 卡片 5：金句 + tags */
    .card-quote .label { position: absolute; top: 280px; left: 80px; right: 80px; font-size: 32px; letter-spacing: 8px; color: var(--ink-muted); text-transform: uppercase; }
    .card-quote h2.title { position: absolute; top: 340px; left: 80px; right: 80px; font-family: var(--font-serif); font-weight: 700; font-size: 96px; line-height: 1.2; margin: 0; }
    .card-quote .sub { position: absolute; top: 470px; left: 80px; right: 80px; font-size: 30px; color: var(--ink-muted); }
    .card-quote .list { position: absolute; top: 600px; left: 80px; right: 80px; }
    .card-quote .row { position: absolute; left: 0; right: 0; display: flex; }
    .card-quote .row .quote-mark { flex-shrink: 0; width: 72px; height: 72px; border-radius: 16px; background: var(--cream); border: 3px solid var(--warm); color: var(--warm); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 60px; line-height: 1; margin-top: 4px; }
    .card-quote .row .text { flex: 1; margin-left: 24px; padding-top: 8px; font-family: var(--font-serif); font-size: 44px; line-height: 1.5; color: var(--ink-strong); }
    .card-quote .underline { position: absolute; bottom: 360px; left: 80px; width: 280px; height: 6px; background: var(--warm); }
    .card-quote .tags { position: absolute; bottom: 220px; left: 80px; right: 80px; display: flex; flex-wrap: wrap; gap: 18px; }
    .card-quote .tag { padding: 20px 32px; border-radius: 999px; background: var(--cream); color: var(--ink-strong); border: 2px solid var(--ink-strong); font-size: 30px; letter-spacing: 1px; }
    .card-quote .tag.primary { background: var(--ink-strong); color: var(--cream); }

    /* ====== Footer ====== */
    .page-footer { max-width: 1200px; margin: 80px auto 0; padding-top: 24px; border-top: 1px solid var(--line); text-align: center; font-size: 12px; color: var(--ink-soft); }
  </style>
</head>

<body>
  <main>
    <header class="page-header">
      <span class="tag">BOOK · NOTES</span>
      <h1>书摘卡片生成器</h1>
      <p>输入书名，自动提炼生成 5 张可发布的书籍卡片</p>
    </header>

    <section class="input-area">
      <form id="form" class="input-row" onsubmit="return false;">
        <input id="bookName" type="text" placeholder="输入书名，如：原子习惯" maxlength="50" />
        <button id="submitBtn" type="submit">生成卡片</button>
      </form>
      <div class="input-hint">
        <button class="btn-cover-toggle" id="coverToggle">加封面图（可选）</button>
      </div>
      <div id="coverBox" class="cover-input-box" style="display: none;">
        <label>粘贴封面图 URL，豆瓣读书页/淘宝/京东/出版社/任意图床均可</label>
        <input id="coverUrl" type="url" placeholder="封面图 URL（豆瓣读书页、图床直链、淘宝/京东图等均可）" />
        <div id="coverPreview"></div>
      </div>
      <div id="error" class="error-msg" style="display: none;"></div>
    </section>

    <section id="skeleton" class="skeleton" style="display: none;">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </section>

    <section id="downloadAll" class="download-all" style="display: none;">
      <div>
        <h2 id="deckTitle"></h2>
        <p id="deckMeta" class="meta"></p>
      </div>
      <button id="btnAll" class="btn-all">一键下载全部 (zip)</button>
    </section>

    <section id="deck" class="deck"></section>

    <footer class="page-footer">
      Notion 风格 · 小红书图卡 · 5 张 / 每次
    </footer>
  </main>

  <!-- 第三方库：CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    // ============================================================
    // 状态
    // ============================================================
    const state = { data: null, loading: false, error: null };
    const SLOTS = ["封面", "核心观点", "逻辑框架", "行动启示", "原书金句"];

    // ============================================================
    // DOM refs
    // ============================================================
    const $ = (id) => document.getElementById(id);
    const form = $("form");
    const bookNameEl = $("bookName");
    const submitBtn = $("submitBtn");
    const coverToggle = $("coverToggle");
    const coverBox = $("coverBox");
    const coverUrlEl = $("coverUrl");
    const coverPreview = $("coverPreview");
    const errorEl = $("error");
    const skeletonEl = $("skeleton");
    const deckEl = $("deck");
    const downloadAllEl = $("downloadAll");
    const deckTitleEl = $("deckTitle");
    const deckMetaEl = $("deckMeta");
    const btnAllEl = $("btnAll");

    // ============================================================
    // 封面 URL 解析（与项目 lib/douban.ts 一致）
    // ============================================================
    const SUBJECT_PATTERN = /subject\/(\d{5,10})/;
    const IMG_EXT_PATTERN = /\.(jpe?g|png|webp|gif|avif|bmp)(\?.*)?(#.*)?$/i;

    function parseCoverUrl(input) {
      if (!input) return null;
      const url = input.trim();
      if (!url) return null;
      if (!/^https?:\/\//i.test(url)) return null;
      if (IMG_EXT_PATTERN.test(url)) return url;
      const m = url.match(SUBJECT_PATTERN);
      if (m && m[1]) {
        return `https://img1.doubanio.com/view/subject/l/public/s${m[1]}.jpg`;
      }
      return url;
    }

    coverToggle.onclick = () => {
      const showing = coverBox.style.display !== "none";
      coverBox.style.display = showing ? "none" : "block";
      coverToggle.textContent = showing ? "加封面图（可选）" : "收起";
    };

    coverUrlEl.oninput = () => {
      const url = coverUrlEl.value.trim();
      if (!url) { coverPreview.innerHTML = ""; return; }
      const parsed = parseCoverUrl(url);
      if (!parsed) {
        coverPreview.innerHTML = `<p class="preview-error">URL 不合法。请填写以 http:// 或 https:// 开头的图片链接</p>`;
        return;
      }
      coverPreview.innerHTML = `
        <div class="preview">
          <img src="${parsed}" alt="封面预览" onerror="this.style.opacity=0.3" />
          <p>已就绪，将作为第 1 张卡片主图</p>
        </div>`;
    };

    // ============================================================
    // 提交
    // ============================================================
    form.onsubmit = async (e) => {
      e.preventDefault();
      if (state.loading) return;
      const name = bookNameEl.value.trim();
      if (!name) return;
      const coverImageUrl = parseCoverUrl(coverUrlEl.value);

      state.loading = true;
      state.error = null;
      state.data = null;
      render();

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bookName: name }),
        });
        const json = await res.json();
        if (!res.ok || !json.ok) {
          throw new Error(json.message || `请求失败 (${res.status})`);
        }
        state.data = { ...json.data, coverImageUrl };
      } catch (err) {
        state.error = err.message || String(err);
      } finally {
        state.loading = false;
        render();
      }
    };

    // ============================================================
    // 渲染
    // ============================================================
    function render() {
      // 提交按钮
      submitBtn.disabled = state.loading;
      submitBtn.innerHTML = state.loading
        ? '<span class="spinner"></span> 生成中'
        : "生成卡片";

      // 错误
      if (state.error) {
        errorEl.textContent = state.error;
        errorEl.style.display = "block";
      } else {
        errorEl.style.display = "none";
      }

      // 骨架
      skeletonEl.style.display = state.loading ? "grid" : "none";

      // 顶部下载条
      if (state.data && !state.loading) {
        downloadAllEl.style.display = "flex";
        deckTitleEl.textContent = state.data.title;
        deckMetaEl.textContent = (state.data.author || "") + " · 共 5 张";
      } else {
        downloadAllEl.style.display = "none";
      }

      // 卡片网格
      if (state.data && !state.loading) {
        deckEl.innerHTML = renderCards(state.data);
        fitAllCanvases();
        fitCoreFontSize();
        fitCoverTexts();
      } else {
        deckEl.innerHTML = "";
      }
    }

    // ============================================================
    // 5 张卡片渲染
    // ============================================================
    function renderCards(data) {
      return [0, 1, 2, 3, 4]
        .map((i) => renderSlot(i, data))
        .join("");
    }

    function renderSlot(index, data) {
      const label = SLOTS[index];
      const cardHtml = renderCardContent(index, data);
      return `
        <div class="slot">
          <div class="slot-header">
            <span class="name">${label}</span>
            <button class="download" onclick="downloadOne(${index})">下载</button>
          </div>
          <div class="card-wrap" data-card-index="${index}">
            <div class="card-canvas" data-card-index="${index}">
              <div class="badge">
                <span class="num">${String(index + 1).padStart(2, "0")}</span>
                <span class="of">/ 05</span>
              </div>
              ${cardHtml}
              <div class="watermark">BOOK NOTES</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderCardContent(index, data) {
      switch (index) {
        case 0: return renderCover(data);
        case 1: return renderCore(data);
        case 2: return renderFramework(data);
        case 3: return renderInsight(data);
        case 4: return renderQuote(data);
      }
    }

    function renderCover(d) {
      const imgBox = d.coverImageUrl
        ? `<div class="frame"><img src="${d.coverImageUrl}" alt="${escapeHtml(d.title)}" crossorigin="anonymous" /></div>`
        : `<div class="placeholder"><div class="emoji">📖</div><div class="label">No Cover Found</div></div>`;
      return `
        <div class="card-cover">
          <div class="topline"></div>
          <div class="reader-tag">A Reader&rsquo;s Note</div>
          <div class="cover-img">${imgBox}</div>
          <h1 class="title">${escapeHtml(d.title)}</h1>
          ${d.author ? `<div class="author">${escapeHtml(d.author)}</div>` : ""}
          ${d.tagline ? `<div class="tagline">&ldquo;${escapeHtml(d.tagline)}&rdquo;</div>` : ""}
          <div class="bottomline"></div>
          <div class="footer-tag">读书 · 拆解</div>
        </div>
      `;
    }

    function renderCore(d) {
      return `
        <div class="card-core">
          <div class="label">02 — Core Idea</div>
          <div class="pill">核心观点</div>
          <div class="line-top"></div>
          <div class="text-wrap" id="core-wrap">
            <p id="core-text">${escapeHtml(d.coreIdea)}</p>
          </div>
          <div class="line-bottom"></div>
          <div class="sub">一句话告诉你，这本书到底在讲什么。</div>
        </div>
      `;
    }

    function renderFramework(d) {
      const list = d.framework;
      const listTop = 600;
      const listBottom = 1500;
      const available = listBottom - listTop;
      const rowH = Math.max(184, Math.floor(available / Math.max(list.length, 1)));
      const rows = list.map((p, i) => `
        <div class="row ${i % 2 ? "alt" : ""}" style="top: ${i * rowH}px;">
          <div class="num">${i + 1}</div>
          <div class="body">
            <div class="name">${escapeHtml(p.name)}</div>
            <div class="desc">${escapeHtml(p.desc)}</div>
          </div>
        </div>
      `).join("");
      const dots = Array.from({ length: Math.max(list.length, 5) })
        .map((_, i) => `<div class="dot ${i < list.length ? "on" : ""}" style="width: ${i < list.length ? 36 : 12}px;"></div>`)
        .join("");
      return `
        <div class="card-framework">
          <div class="label">03 — Framework</div>
          <h2 class="title">全书逻辑框架</h2>
          <div class="sub">${list.length} 个关键支点，按书的内在顺序排列</div>
          <div class="list">${rows}</div>
          <div class="dots">${dots}</div>
        </div>
      `;
    }

    function renderInsight(d) {
      const startY = 740;
      const rowH = 240;
      const rows = d.insights.map((s, i) => `
        <div class="row" style="top: ${i * rowH}px;">
          <div class="check">▢</div>
          <div class="text">${escapeHtml(s)}</div>
        </div>
      `).join("");
      return `
        <div class="card-insight">
          <div class="label">04 — Action</div>
          <h2 class="title">读完之后，<br />你可以这样用</h2>
          <div class="sub">三件可立刻执行的小事</div>
          <div class="list" style="top: ${startY}px;">${rows}</div>
        </div>
      `;
    }

    function renderQuote(d) {
      const rowH = 280;
      const rows = d.keyQuotes.map((q, i) => `
        <div class="row" style="top: ${i * rowH}px;">
          <div class="quote-mark">&ldquo;</div>
          <div class="text">${escapeHtml(q)}</div>
        </div>
      `).join("");
      const tags = d.tags.map((t, i) => {
        const text = t.startsWith("#") ? t : "#" + t;
        return `<span class="tag ${i === 0 ? "primary" : ""}">${escapeHtml(text)}</span>`;
      }).join("");
      return `
        <div class="card-quote">
          <div class="label">05 — Key Quotes</div>
          <h2 class="title">原书金句</h2>
          <div class="sub">3 句最打动人的段落 / 凝练</div>
          <div class="list">${rows}</div>
          <div class="underline"></div>
          <div class="tags">${tags}</div>
        </div>
      `;
    }

    // ============================================================
    // 工具
    // ============================================================
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function fitAllCanvases() {
      document.querySelectorAll(".card-canvas").forEach((c) => {
        const wrap = c.parentElement;
        if (!wrap) return;
        const scale = wrap.clientWidth / 1080;
        c.style.transform = `scale(${scale})`;
      });
    }

    function fitCoreFontSize() {
      const wrap = document.getElementById("core-wrap");
      const text = document.getElementById("core-text");
      if (!wrap || !text) return;
      let size = 72;
      text.style.fontSize = size + "px";
      const MIN = 44;
      while (text.scrollHeight > wrap.clientHeight && size > MIN) {
        size -= 2;
        text.style.fontSize = size + "px";
      }
    }

    /**
     * 封面 3 个文字元素：单行不换行 + 缩字号到 fit。
     * 容器固定宽 1080-160=920px（左右各留 80px）。
     */
    const COVER_CONTENT_W = 920;
    function fitSingleLine(el, maxSize, minSize) {
      if (!el) return;
      el.style.whiteSpace = "nowrap";
      el.style.overflow = "hidden";
      el.style.textOverflow = "ellipsis";
      let size = maxSize;
      el.style.fontSize = size + "px";
      while (el.scrollWidth > COVER_CONTENT_W && size > minSize) {
        size -= 2;
        el.style.fontSize = size + "px";
      }
    }

    function fitCoverTexts() {
      fitSingleLine(document.querySelector(".card-cover h1.title"), 132, 56);
      fitSingleLine(document.querySelector(".card-cover .author"), 36, 22);
      fitSingleLine(document.querySelector(".card-cover .tagline"), 38, 24);
    }

    window.addEventListener("resize", () => {
      if (state.data) {
        fitAllCanvases();
        fitCoreFontSize();
        fitCoverTexts();
      }
    });

    // ============================================================
    // 下载
    // ============================================================
    const LABELS = ["cover", "core", "framework", "action", "quote"];

    async function downloadOne(index) {
      const canvas = document.querySelector(`.card-canvas[data-card-index="${index}"]`);
      if (!canvas || typeof htmlToImage === "undefined") return;
      const safe = sanitizeFilename(state.data.title);
      const filename = `${safe}-${String(index + 1).padStart(2, "0")}-${LABELS[index]}.png`;
      const dataUrl = await htmlToImage.toPng(canvas, {
        width: 1080,
        height: 1920,
        pixelRatio: 1,
        cacheBust: true,
        style: { transform: "none" },
      });
      triggerDownload(dataUrl, filename);
    }

    btnAllEl.onclick = async () => {
      if (!state.data || typeof JSZip === "undefined") return;
      btnAllEl.disabled = true;
      const oldText = btnAllEl.textContent;
      btnAllEl.textContent = "打包中...";
      try {
        const safe = sanitizeFilename(state.data.title);
        const zip = new JSZip();
        for (let i = 0; i < 5; i++) {
          const canvas = document.querySelector(`.card-canvas[data-card-index="${i}"]`);
          if (!canvas) continue;
          const dataUrl = await htmlToImage.toPng(canvas, {
            width: 1080,
            height: 1920,
            pixelRatio: 1,
            cacheBust: true,
            style: { transform: "none" },
          });
          const filename = `${safe}-${String(i + 1).padStart(2, "0")}-${LABELS[i]}.png`;
          zip.file(filename, dataUrlToBlob(dataUrl));
        }
        const blob = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${safe}-5cards.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (err) {
        state.error = "下载失败：" + (err.message || err);
        render();
      } finally {
        btnAllEl.disabled = false;
        btnAllEl.textContent = oldText;
      }
    };

    function triggerDownload(dataUrl, filename) {
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function dataUrlToBlob(dataUrl) {
      const [meta, b64] = dataUrl.split(",");
      const mime = meta.match(/data:(.*?);/)?.[1] || "image/png";
      const bin = atob(b64);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: mime });
    }

    function sanitizeFilename(s) {
      return s
        .replace(/[《》【】\[\]()「」"'`]/g, "")
        .replace(/[\\/:*?<>|]/g, "")
        .replace(/\s+/g, "-")
        .slice(0, 30) || "book";
    }

    // ============================================================
    // 首次渲染
    // ============================================================
    render();
  </script>
</body>
</html>
